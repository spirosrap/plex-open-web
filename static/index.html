<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Plex Open Web</title>
    <script>
      (() => {
        const key = "plex-open-web-theme-v1";
        let theme = "system";
        try {
          const stored = localStorage.getItem(key);
          theme = ["system", "light", "dark"].includes(stored) ? stored : "system";
        } catch {}
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = theme;
        document.documentElement.dataset.resolvedTheme = theme === "system" ? (systemDark ? "dark" : "light") : theme;
      })();
    </script>
    <link rel="stylesheet" href="/styles.css?v=__APP_VERSION__" />
  </head>
  <body>
    <main id="login" class="login-shell" hidden>
      <form id="login-form" class="login-panel">
        <div class="brand-mark">POW</div>
        <h1>Plex Open Web</h1>
        <p id="login-version" class="app-version">Version __APP_VERSION__</p>
        <div class="theme-field">
          <label for="login-theme">Color theme</label>
          <select id="login-theme">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <label for="password">Password</label>
        <div class="login-row">
          <input id="password" name="password" type="password" autocomplete="current-password" autofocus />
          <button type="submit">Sign in</button>
        </div>
        <p id="login-error" class="error-text" aria-live="polite"></p>
      </form>
    </main>

    <main id="app" class="app-shell" hidden>
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">POW</div>
          <div>
            <strong>Plex Open Web</strong>
            <span id="server-name">Media server</span>
            <span id="app-version" class="app-version">Version __APP_VERSION__</span>
          </div>
        </div>
        <nav id="libraries" class="library-list" aria-label="Libraries"></nav>
        <div class="sidebar-footer">
          <label class="theme-field" for="app-theme">
            <span>Color theme</span>
            <select id="app-theme">
              <option value="system">System</option>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
          </label>
          <button id="logout" class="ghost-button">Sign out</button>
        </div>
      </aside>

      <section class="content">
        <header class="topbar">
          <div>
            <div id="breadcrumbs" class="breadcrumbs"></div>
            <h1 id="view-title">Library</h1>
          </div>
          <form id="search-form" class="search">
            <input id="search-input" type="search" placeholder="Search" autocomplete="off" />
            <button type="submit">Search</button>
          </form>
        </header>

        <div class="toolbar">
          <div class="segmented" role="tablist" aria-label="View">
            <button class="view-button" data-view="continue">Continue</button>
            <button class="view-button" data-view="recent">Recent</button>
            <button class="view-button active" data-view="all">All</button>
            <button class="view-button" data-view="unwatched">Unwatched</button>
            <button class="view-button" data-view="collections">Collections</button>
            <button class="view-button" data-view="mylist">My List</button>
          </div>
          <div class="toolbar-actions">
            <select id="genre-filter" aria-label="Genre">
              <option value="">All genres</option>
            </select>
            <select id="sort" aria-label="Sort">
              <option value="addedAt:desc">Recently added</option>
              <option value="titleSort">Title</option>
              <option value="year:desc">Year</option>
              <option value="lastViewedAt:desc">Recently watched</option>
            </select>
            <button id="surprise-me" class="secondary-button" type="button">Surprise me</button>
            <button id="scan-library" class="scan-button" type="button" title="Ask Plex to scan this library">Scan library</button>
          </div>
        </div>

        <div id="status" class="status" aria-live="polite"></div>
        <section id="grid" class="media-grid" aria-live="polite"></section>
        <button id="load-more" class="load-more-button" type="button" hidden>Load more</button>
      </section>
    </main>

    <dialog id="details-dialog" class="details-dialog">
      <div class="details-layout">
        <img id="details-poster" alt="" />
        <section>
          <div class="details-head">
            <div>
              <p id="details-kicker"></p>
              <h2 id="details-title"></h2>
            </div>
            <button id="details-close" class="icon-button" aria-label="Close">x</button>
          </div>
          <p id="details-summary"></p>
          <div id="details-meta" class="meta-row"></div>
          <div class="details-actions">
            <button id="details-play" class="primary-button">Play</button>
            <button id="details-open" class="secondary-button">Open</button>
            <button id="details-previous-episode" class="secondary-button" hidden>Previous episode</button>
            <button id="details-next-episode" class="secondary-button" hidden>Next episode</button>
            <button id="details-subtitles" class="secondary-button">Subtitles</button>
            <button id="details-watch-state" class="secondary-button">Mark watched</button>
            <button id="details-my-list" class="secondary-button">Add to My List</button>
            <button id="details-collections" class="secondary-button" hidden>Collections</button>
            <button id="details-delete-media" class="secondary-button danger-button" hidden>Delete from disk</button>
          </div>
        </section>
      </div>
    </dialog>

    <dialog id="media-delete-dialog" class="media-delete-dialog">
      <form id="media-delete-form">
        <header class="media-delete-head">
          <div>
            <p>Permanent deletion</p>
            <h2 id="media-delete-title">Delete from disk?</h2>
          </div>
          <button id="media-delete-close" class="icon-button" type="button" aria-label="Close">x</button>
        </header>
        <div id="media-delete-status" class="media-delete-status" aria-live="polite">Inspecting files...</div>
        <div id="media-delete-plan" hidden>
          <p id="media-delete-summary" class="media-delete-summary"></p>
          <section id="media-delete-paths" class="media-delete-paths" aria-label="Files and folders to delete"></section>
          <ul id="media-delete-warnings" class="media-delete-warnings"></ul>
          <label class="media-delete-confirm-field" for="media-delete-confirmation">
            <span>Type <strong>DELETE</strong> to confirm</span>
            <input id="media-delete-confirmation" type="text" autocomplete="off" autocapitalize="characters" spellcheck="false" />
          </label>
        </div>
        <div class="media-delete-actions">
          <button id="media-delete-cancel" type="button" class="secondary-button">Cancel</button>
          <button id="media-delete-submit" type="submit" class="danger-button" disabled>Delete permanently</button>
        </div>
      </form>
    </dialog>

    <dialog id="collection-dialog" class="collection-dialog">
      <header class="collection-head">
        <div>
          <p>Plex collections</p>
          <h2 id="collection-title">Manage collections</h2>
        </div>
        <button id="collection-close" class="icon-button" aria-label="Close">x</button>
      </header>
      <form id="collection-create-form" class="collection-create-form">
        <input id="collection-create-title" type="text" maxlength="120" placeholder="New collection name" autocomplete="off" />
        <button id="collection-create" type="submit" class="primary-button">Create</button>
      </form>
      <input id="collection-filter" type="search" placeholder="Filter collections" autocomplete="off" />
      <div id="collection-status" class="collection-status" aria-live="polite"></div>
      <section id="collection-list" class="collection-list" aria-live="polite"></section>
    </dialog>

    <dialog id="collection-name-dialog" class="collection-name-dialog">
      <form id="collection-name-form">
        <h2>Rename collection</h2>
        <label for="collection-name-input">Collection name</label>
        <input id="collection-name-input" type="text" maxlength="120" autocomplete="off" required />
        <div id="collection-name-status" class="collection-status" aria-live="polite"></div>
        <div class="collection-name-actions">
          <button id="collection-name-cancel" type="button" class="secondary-button">Cancel</button>
          <button id="collection-name-save" type="submit" class="primary-button">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="player-dialog" class="player-dialog">
      <header>
        <strong id="player-title"></strong>
        <div class="player-controls">
          <span id="playback-mode" class="playback-mode"></span>
          <label id="subtitle-select-label" for="subtitle-select">Subtitles</label>
          <select id="subtitle-select"></select>
          <button id="player-save" class="secondary-button" type="button" hidden>Save</button>
          <button id="player-delete-save" class="secondary-button danger-button" type="button" hidden>Delete saved</button>
          <button id="player-device-save" class="secondary-button" type="button" hidden>Save device</button>
          <button id="player-device-delete" class="secondary-button danger-button" type="button" hidden>Delete device</button>
          <button id="player-download-original" class="secondary-button" type="button" hidden>Download</button>
          <button id="player-subtitle-search" class="secondary-button" type="button" hidden>Find</button>
          <label id="autoplay-next-label" class="toggle-field" hidden>
            <input id="autoplay-next" type="checkbox" />
            <span>Auto next</span>
          </label>
          <button id="player-next-episode" class="secondary-button" type="button" hidden>Next episode</button>
          <button id="player-close" class="icon-button" aria-label="Close">x</button>
        </div>
      </header>
      <video id="player" controls playsinline></video>
      <div id="player-error" class="player-error" role="alert" hidden></div>
      <div id="player-up-next" class="up-next-banner" hidden>
        <strong id="player-up-next-text"></strong>
        <button id="player-up-next-cancel" class="secondary-button" type="button">Cancel</button>
      </div>
    </dialog>

    <dialog id="subtitle-dialog" class="subtitle-dialog">
      <header class="subtitle-head">
        <div>
          <p>OpenSubtitles</p>
          <h2>Find subtitles</h2>
        </div>
        <button id="subtitle-close" class="icon-button" aria-label="Close">x</button>
      </header>
      <form id="subtitle-form" class="subtitle-form">
        <select id="subtitle-language" aria-label="Language">
          <option value="el">Greek</option>
          <option value="en">English</option>
          <option value="all">All languages</option>
        </select>
        <input id="subtitle-query" type="search" placeholder="Title or release" autocomplete="off" />
        <button type="submit" class="primary-button">Search</button>
      </form>
      <div id="subtitle-status" class="subtitle-status" aria-live="polite"></div>
      <section id="subtitle-results" class="subtitle-results" aria-live="polite"></section>
    </dialog>

    <script src="/app.js?v=__APP_VERSION__" type="module"></script>
  </body>
</html>
